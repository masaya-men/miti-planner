</head>

<body>
  <script>
    // テーマフラッシュ防止: Reactより前にlocalStorageからテーマを適用
    try {
      var d = JSON.parse(localStorage.getItem('theme-storage') || '{}');
      var t = d && d.state && d.state.theme;
      if (t === 'light' || t === 'dark') {
        document.documentElement.classList.add('theme-' + t);
      } else {
        document.documentElement.classList.add(window.matchMedia('(prefers-color-scheme: light)').matches ? 'theme-light' : 'theme-dark');
      }
    } catch(e) {
      document.documentElement.classList.add(window.matchMedia('(prefers-color-scheme: light)').matches ? 'theme-light' : 'theme-dark');
    }
    // フォントサイズスケーリング（最小6px保証）
    document.documentElement.setAttribute('data-font-scale', '1');
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

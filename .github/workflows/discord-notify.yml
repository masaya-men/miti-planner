name: Discord Update Notification

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        shell: bash
        run: |
          COMMITS=$(git log --pretty=format:"%s" "${BEFORE_SHA}..${AFTER_SHA}" 2>/dev/null | grep -iE "^(feat|fix):" | head -10 || true)

          if [ -z "$COMMITS" ]; then
            echo "No feat/fix commits, skipping."
            exit 0
          fi

          BULLET_LIST=$(echo "$COMMITS" | sed 's/^feat: /* ✨ /' | sed 's/^fix: /* 🔧 /')

          MESSAGE=$(printf "# 🛡️ LoPo アップデート\n\n%s\n\n🔗 <https://lopoly.app/>" "$BULLET_LIST")

          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{"content": $content}')

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

          echo "Done"

    <polygon points="52,55 57.7,58 57.7,64 52,67 46.3,64 46.3,58" stroke="rgba(0,0,0,0.8)" stroke-width="1.2" fill="rgba(255,255,255,0.85)" stroke-linejoin="miter"/>

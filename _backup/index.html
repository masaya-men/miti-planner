<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIV MITIGATION SIMULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>XIV MITIGATION SIMULATOR</h1>
    <div class="header-controls">
        <button class="btn" onclick="toggleColorMode()" id="btnColorMode">Color: GROUP</button>
        <button class="btn" onclick="openStatsModal()">Stats</button>
        <button class="btn" onclick="openPartySettings()">
            <img src="./icons/party_members.png" alt="" width="20"> <span>Party</span>
        </button>
    </div>
</header>

<div class="table-container">
    <table id="mainTable">
        <thead>
            <tr id="tableHeader">
                <th class="c-phase">PH</th>
                <th class="c-time">TIME</th>
                <th class="c-event">EVENT</th>
                <th class="c-dmg">U:Dmg</th>
                <th class="c-taken">Taken</th>
                </tr>
        </thead>
        <tbody id="timelineBody">
            </tbody>
    </table>
</div>

<div id="modalEvent" class="modal-mask">
    <div class="modal-window">
        <div class="modal-head">
            <span>Edit Event</span>
            <div class="switch-wrap">
                Calc Mode <label class="toggle"><input type="checkbox" id="modeSwitch" onchange="toggleCalcMode()"><span class="slider"></span></label>
            </div>
        </div>
        <div class="modal-body" onkeydown="if(event.key==='Enter') saveEvent()">
            <div class="form-row"><label class="form-label">Name</label><input type="text" id="evtName" class="form-input"></div>
            <div class="form-row"><label class="form-label">Type</label>
                <div class="radio-grp" id="grpType">
                    <div class="radio-opt" onclick="setRadio('type','type_magic')" data-val="type_magic"><img src="./icons/type_magic.png"></div>
                    <div class="radio-opt" onclick="setRadio('type','type_phys')" data-val="type_phys"><img src="./icons/type_phys.png"></div>
                    <div class="radio-opt" onclick="setRadio('type','type_dark')" data-val="type_dark"><img src="./icons/type_dark.png"></div>
                </div>
                <input type="hidden" id="valType">
            </div>
            <div class="form-row"><label class="form-label">Target</label>
                <div class="radio-grp" id="grpTarget">
                    <div class="radio-opt" onclick="setRadio('target','Party')" data-val="Party" style="width:30px;color:#fff;font-size:10px;justify-content:center;">ALL</div>
                    <div class="radio-opt" onclick="setRadio('target','MT')" data-val="MT"><img id="imgMT" src=""></div>
                    <div class="radio-opt" onclick="setRadio('target','ST')" data-val="ST"><img id="imgST" src=""></div>
                </div>
                <input type="hidden" id="valTarget">
            </div>
            <hr style="border:0;border-top:1px solid #333;margin:10px 0;">
            <div id="secDirect">
                <div class="form-row"><label class="form-label">U:Dmg</label><input type="number" id="inpUDmg" class="form-input" placeholder="100000"></div>
            </div>
            <div id="secCalc" class="hidden">
                <div class="calc-info">Reverse-calculate U:Dmg from target damage.</div>
                <div class="form-row"><label class="form-label text-safe">Target</label><input type="number" id="inpCalcTaken" class="form-input" placeholder="10000"></div>
                <div class="form-row"><label class="form-label">Barrier</label><input type="number" id="inpCalcBarrier" class="form-input" placeholder="0"></div>
                <div class="form-row" style="align-items:flex-start;">
                    <label class="form-label">Sim Miti</label>
                    <div style="flex:1;"><div class="miti-grid" id="calcMitiGrid"></div></div>
                </div>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-danger" style="margin-right:auto;" onclick="deleteEvent()">Delete</button>
            <button class="btn" onclick="closeModal('modalEvent')">Cancel</button>
            <button class="btn btn-primary" onclick="saveEvent()">Save</button>
        </div>
    </div>
</div>

<div id="modalSkill" class="modal-mask" onclick="if(event.target==this) closeModal('modalSkill')" style="align-items:flex-start;">
    <div class="modal-window" style="width:300px; margin:0;" id="skillWin">
        <div class="modal-head">
            <span id="skillTitle">Skill</span>
            <button class="btn btn-danger" style="padding:2px 6px; font-size:10px;" onclick="clearCell()">Clear</button>
        </div>
        <div class="modal-body" style="padding:10px;">
            <div id="skillContainer"></div>
        </div>
    </div>
</div>

<div id="modalParty" class="modal-mask">
    <div class="modal-window" style="width:650px;">
        <div class="modal-head">Party Configuration</div>
        <div class="modal-body" onkeydown="if(event.key==='Enter') savePartyConfig()">
            <div class="party-config-row">
                <div class="party-col">
                    <div class="party-col-title" style="color:var(--accent-blue)">MT Group</div>
                    <div class="party-slots-grid" id="mtSlots"></div>
                </div>
                <div class="party-col">
                    <div class="party-col-title" style="color:#f1c40f">ST Group</div>
                    <div class="party-slots-grid" id="stSlots"></div>
                </div>
            </div>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:15px;">
                <div class="form-row"><label class="form-label">Tank HP</label><input type="number" id="hpTank" class="form-input" style="width:100px;"></div>
                <div class="form-row"><label class="form-label">Other HP</label><input type="number" id="hpOther" class="form-input" style="width:100px;"></div>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-primary" onclick="savePartyConfig()">Save & Close</button>
        </div>
    </div>
</div>

<div id="modalJob" class="modal-mask">
    <div class="modal-window" style="width:360px;">
        <div class="modal-head">Select Job</div>
        <div class="modal-body"><div class="job-grid" id="jobGrid"></div></div>
        <div class="modal-foot"><button class="btn" onclick="closeModal('modalJob')">Cancel</button></div>
    </div>
</div>

<div id="modalStats" class="modal-mask">
    <div class="modal-window" style="width:300px;">
        <div class="modal-head">Stats (Lv100)</div>
        <div class="modal-body" onkeydown="if(event.key==='Enter') saveStats()">
            <div class="form-row"><label class="form-label">Main</label><input type="number" id="sMain" class="form-input"></div>
            <div class="form-row"><label class="form-label">WD</label><input type="number" id="sWD" class="form-input"></div>
            <div class="form-row"><label class="form-label">DET</label><input type="number" id="sDet" class="form-input"></div>
            <div class="form-row"><label class="form-label">TNC</label><input type="number" id="sTnc" class="form-input"></div>
        </div>
        <div class="modal-foot"><button class="btn btn-primary" onclick="saveStats()">Save</button></div>
    </div>
</div>

<div id="modalPhase" class="modal-mask">
    <div class="modal-window" style="width:300px;">
        <div class="modal-head">Set Phase</div>
        <div class="modal-body" onkeydown="if(event.key==='Enter') savePhase()">
            <input type="text" id="inpPhase" class="form-input" style="width:100%">
        </div>
        <div class="modal-foot"><button class="btn btn-primary" onclick="savePhase()">OK</button></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

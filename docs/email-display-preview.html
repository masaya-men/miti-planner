<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>email表示箇所プレビュー</title>
<style>
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 40px; display: flex; gap: 60px; flex-wrap: wrap; }
  .section { background: #16213e; border-radius: 12px; padding: 24px; border: 1px solid #333; }
  .section h3 { margin: 0 0 8px; font-size: 13px; color: #888; }
  .section .file { font-size: 11px; color: #666; margin-bottom: 16px; }
  /* Layout.tsx モバイルメニュー再現 */
  .mobile-menu { display: flex; align-items: center; gap: 12px; padding: 4px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2a2a4a; border: 1px solid #444; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar span { font-size: 14px; font-weight: bold; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-email { font-size: 10px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .highlight { background: #ff4444; color: white; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 6px; }
  .logout-btn { margin-top: 12px; width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #2a2a4a; color: #e0e0e0; font-size: 14px; font-weight: bold; cursor: pointer; text-align: center; }
  /* AdminLayout.tsx サイドバー再現 */
  .admin-sidebar { width: 220px; border-right: 1px solid rgba(255,255,255,0.1); }
  .admin-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .admin-title { font-size: 14px; font-weight: bold; }
  .admin-user { font-size: 10px; color: #888; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .admin-nav { padding: 8px; display: flex; flex-direction: column; gap: 2px; }
  .admin-nav-item { padding: 8px 12px; border-radius: 4px; font-size: 12px; color: #aaa; }
  .admin-nav-item.active { background: rgba(255,255,255,0.1); color: white; }
  .arrow { display: inline-block; margin-top: 4px; font-size: 18px; color: #ff4444; }
  .note { font-size: 11px; color: #ff8888; margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>

<!-- 箇所1: Layout.tsx モバイルメニュー -->
<div class="section" style="width: 300px;">
  <h3>箇所1: モバイルメニュー（スマホのみ表示）</h3>
  <div class="file">Layout.tsx:394-395</div>
  <div class="mobile-menu">
    <div class="avatar">
      <span>M</span>
    </div>
    <div class="user-info">
      <div class="user-name">Masaya Maeno</div>
      <div class="user-email">
        masaya.maeno0106@gmail.com
        <span class="highlight">ここ</span>
      </div>
    </div>
  </div>
  <div class="arrow">↑</div>
  <div class="note">ユーザー名の下にメールアドレスが小さく表示される</div>
  <div class="logout-btn">ログアウト</div>
</div>

<!-- 箇所2: AdminLayout.tsx -->
<div class="section" style="width: 240px;">
  <h3>箇所2: 管理画面サイドバー（管理者のみ）</h3>
  <div class="file">AdminLayout.tsx:39</div>
  <div class="admin-sidebar">
    <div class="admin-header">
      <div class="admin-title">LoPo Admin</div>
      <div class="admin-user">
        Masaya Maeno
        <span class="highlight">emailはフォールバック</span>
      </div>
    </div>
    <div class="admin-nav">
      <div class="admin-nav-item active">ダッシュボード</div>
      <div class="admin-nav-item">コンテンツ管理</div>
      <div class="admin-nav-item">テンプレート管理</div>
    </div>
  </div>
  <div class="note" style="margin-top: 12px;">
    displayNameがある場合はemailは表示されない<br>
    displayNameがnullの場合のみemailがフォールバック表示
  </div>
</div>

</body>
</html>

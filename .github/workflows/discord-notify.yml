name: Discord Update Notification

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and send Discord message
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # feat: と fix: のコミットのみ抽出（chore/docs等は除外）
          COMMITS=$(git log --pretty=format:"%s" ${{ github.event.before }}..${{ github.sha }} \
            | grep -iE "^(feat|fix):" \
            | sed 's/^feat: /✨ /' \
            | sed 's/^fix: /🔧 /' \
            | head -10)

          # 対象コミットがなければ通知しない
          if [ -z "$COMMITS" ]; then
            echo "No feat/fix commits, skipping notification."
            exit 0
          fi

          # 箇条書きに整形
          BULLET_LIST=$(echo "$COMMITS" | sed 's/^/・/')

          # Discordメッセージ組み立て
          MESSAGE="# 🛡️ LoPo アップデート

${BULLET_LIST}

🔗 <https://lopoly.app/>"

          # JSON payload作成（jqで安全にエスケープ）
          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{"content": $content}')

          # Discord Webhookに送信
          curl -s -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"

          echo "Discord notification sent!"

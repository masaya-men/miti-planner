    <line x1="50" y1="28" x2="46" y2="8" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="50" y1="28" x2="56" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="46" y1="8" x2="40" y2="3" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="56" y1="10" x2="62" y2="5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
